<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Configuration | ADS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

  <nav class="side-nav">
    <div class="logo">ADS</div>
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i></a>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-microchip"></i></a>
    <a href="support.html" class="nav-item"><i class="fas fa-shield-alt"></i></a>
    <a href="settings.html" class="nav-item active"><i class="fas fa-cog"></i></a>
  </nav>

  <main class="dashboard-content">
    <div class="support-header">
      <h1>Device <span class="highlight">Configuration</span></h1>
      <p>Manage hardware settings and emergency contact registry.</p>
    </div>

    <div class="support-grid">
      
      <section class="glass-panel">
        <h3><i class="fas fa-address-book" style="color: #ffcc00;"></i> Emergency Contacts</h3>
        <p style="font-size: 13px; color: #666; margin-bottom: 20px;">The GSM module will send automated alerts to these numbers.</p>
        
        <form class="clean-form">
          <div class="input-group">
            <label>Primary Emergency Contact (Family)</label>
            <input type="tel" placeholder="+91 XXXXX XXXXX" value="+91 ">
          </div>
          <div class="input-group">
            <label>Nearest Hospital Liaison</label>
            <input type="tel" placeholder="+91 XXXXX XXXXX" value="+91 ">
          </div>
          <div class="input-group">
            <label>Vehicle Owner Name</label>
            <input type="text" placeholder="John Doe">
          </div>
          <button type="button" class="sub-btn" onclick="saveSettings()">Save Configuration</button>
        </form>
      </section>

      <div class="right-col">
        <section class="glass-panel">
          <h3><i class="fas fa-tools" style="color: #3498db;"></i> Sensor Calibration</h3>
          <div class="health-item">
            <label>Gyroscope Sensitivity</label>
            <input type="range" min="1" max="10" value="7">
          </div>
          <div class="health-item">
            <label>GPS Refresh Rate</label>
            <select>
              <option>1 Second (High Power)</option>
              <option selected>5 Seconds (Normal)</option>
              <option>10 Seconds (Power Save)</option>
            </select>
          </div>
        </section>

        <section class="glass-panel">
          <h3><i class="fas fa-wifi" style="color: #2ecc71;"></i> GSM Status</h3>
          <div class="c-card">
            <span>Signal Strength</span>
            <strong style="color: #2ecc71;">Excellent (-65 dBm)</strong>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>
    function saveSettings() {
      alert("Settings Synced with ESP32 via Cloud!");
    }
  </script>
</body>
</html>
